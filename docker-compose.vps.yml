services:
  caddy:
    image: caddy:2-alpine
    container_name: dokuru-lab-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    mem_limit: 128m
    cpu_shares: 512
    pids_limit: 100
    depends_on:
      dokuru-lab:
        condition: service_healthy
    networks:
      - dokuru-lab

  dokuru-lab:
    image: ghcr.io/rifuki/dokuru-lab:${VERSION:-latest}
    build: .
    container_name: dokuru-lab
    restart: unless-stopped
    user: root
    pid: host
    ipc: host
    uts: host
    userns_mode: host
    environment:
      NODE_ENV: production
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8080}
      LAB_DATA_DIR: ${LAB_DATA_DIR:-/app/data}
    volumes:
      - ./data:/app/data
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:$${PORT:-8080}/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dokuru-lab

volumes:
  caddy-data:
  caddy-config:

networks:
  dokuru-lab:
    name: dokuru-lab
    driver: bridge
