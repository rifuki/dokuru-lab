services:
  dokuru-lab:
    build: .
    container_name: dokuru-lab
    restart: unless-stopped
    user: root
    pid: host
    ipc: host
    uts: host
    userns_mode: host
    environment:
      NODE_ENV: production
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8080}
      LAB_DATA_DIR: ${LAB_DATA_DIR:-/app/data}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dokuru-lab.rule=Host(`${DOKURU_LAB_HOST:-lab.dokuru.rifuki.dev}`)"
      - "traefik.http.routers.dokuru-lab.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.dokuru-lab.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.dokuru-lab.loadbalancer.server.port=${PORT:-8080}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:$${PORT:-8080}/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dokuru-lab-internal
      - traefik-public

networks:
  dokuru-lab-internal:
    name: dokuru-lab-internal
    driver: bridge
  traefik-public:
    name: ${TRAEFIK_NETWORK:-traefik-public}
    external: true
