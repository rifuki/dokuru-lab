name: Deploy Compose Service

on:
  workflow_call:
    inputs:
      service:
        description: Docker Compose service to deploy.
        required: true
        type: string
      image-tag:
        description: Container image tag to expose as VERSION during deployment.
        required: true
        type: string
    secrets:
      DOKURU_LAB_DEPLOY_HOST:
        required: false
      DOKURU_LAB_DEPLOY_USER:
        required: false
      DOKURU_LAB_DEPLOY_PORT:
        required: false
      DOKURU_LAB_DEPLOY_PATH:
        required: false
      DOKURU_LAB_DEPLOY_SSH_KEY:
        required: false
      DOKURU_LAB_GHCR_TOKEN:
        required: false

permissions:
  contents: read

concurrency:
  group: dokuru-lab-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ inputs.service }}
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ vars.DOKURU_LAB_DEPLOY_HOST || secrets.DOKURU_LAB_DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DOKURU_LAB_DEPLOY_USER || secrets.DOKURU_LAB_DEPLOY_USER }}
      DEPLOY_PORT: ${{ vars.DOKURU_LAB_DEPLOY_PORT || secrets.DOKURU_LAB_DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ vars.DOKURU_LAB_DEPLOY_PATH || secrets.DOKURU_LAB_DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DOKURU_LAB_DEPLOY_SSH_KEY }}
      GHCR_TOKEN: ${{ secrets.DOKURU_LAB_GHCR_TOKEN }}
      GHCR_USER: ${{ github.actor }}
      IMAGE_TAG: ${{ inputs.image-tag }}
      COMPOSE_FILE: docker-compose.yaml
    steps:
      - name: Validate deployment configuration
        run: |
          missing=()
          [ -n "${DEPLOY_HOST}" ] || missing+=("DOKURU_LAB_DEPLOY_HOST")
          [ -n "${DEPLOY_USER}" ] || missing+=("DOKURU_LAB_DEPLOY_USER")
          [ -n "${DEPLOY_PATH}" ] || missing+=("DOKURU_LAB_DEPLOY_PATH")
          [ -n "${DEPLOY_SSH_KEY}" ] || missing+=("DOKURU_LAB_DEPLOY_SSH_KEY")

          if [ "${#missing[@]}" -ne 0 ]; then
            printf '::error::Missing deployment configuration: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Configure SSH
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/dokuru_lab_deploy_key
          chmod 0600 ~/.ssh/dokuru_lab_deploy_key
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Log in to GHCR on host
        if: env.GHCR_TOKEN != ''
        run: |
          printf '%s' "${GHCR_TOKEN}" \
            | ssh -i ~/.ssh/dokuru_lab_deploy_key -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
                "docker login ghcr.io -u '${GHCR_USER}' --password-stdin"

      - name: Deploy via Docker Compose
        run: |
          remote_env=$(
            printf 'DOKURU_LAB_DEPLOY_PATH=%q DOKURU_LAB_COMPOSE_FILE=%q DOKURU_LAB_VERSION=%q' \
              "${DEPLOY_PATH}" "${COMPOSE_FILE}" "${IMAGE_TAG}"
          )

          ssh -i ~/.ssh/dokuru_lab_deploy_key -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "${remote_env} bash -s" <<'REMOTE'
          set -Eeuo pipefail

          cd "${DOKURU_LAB_DEPLOY_PATH}"

          if [ -d .git ]; then
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
          fi

          test -f "${DOKURU_LAB_COMPOSE_FILE}"

          export VERSION="${DOKURU_LAB_VERSION}"

          docker compose -f "${DOKURU_LAB_COMPOSE_FILE}" config --quiet
          docker compose -f "${DOKURU_LAB_COMPOSE_FILE}" pull
          docker compose -f "${DOKURU_LAB_COMPOSE_FILE}" up -d --no-build --remove-orphans
          docker compose -f "${DOKURU_LAB_COMPOSE_FILE}" ps
          REMOTE
