name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sveltekit:
    name: SvelteKit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: Build
        run: bun run build

  compose:
    name: Compose Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate local compose
        run: docker compose config --quiet

      - name: Validate VPS compose
        run: docker compose -f docker-compose.vps.yml config --quiet

      - name: Validate network-host compose
        run: docker compose -f docker-compose.network-host.yml config --quiet

      - name: Validate hardened example compose
        run: docker compose -f docker-compose.hardened.example.yml config --quiet

  docker-smoke:
    name: Docker Smoke Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: dokuru-lab:smoke
          provenance: false
          sbom: false
          cache-from: type=gha,scope=smoke-dokuru-lab
          cache-to: type=gha,mode=max,scope=smoke-dokuru-lab
