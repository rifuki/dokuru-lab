services:
  caddy:
    image: caddy:2-alpine
    container_name: dokuru-lab-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      dokuru-lab:
        condition: service_healthy
    networks:
      - dokuru-lab

  dokuru-lab:
    image: ghcr.io/rifuki/dokuru-lab:${VERSION:-latest}
    build: .
    container_name: dokuru-lab
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8080}
      LAB_DATA_DIR: ${LAB_DATA_DIR:-/app/data}
      CHECKOUT_API_URL: ${CHECKOUT_API_URL:-http://checkout-api:3000/checkout}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./config:/app/config:ro
    expose:
      - "8080"
    depends_on:
      checkout-api:
        condition: service_healthy
      customer-db:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:$${PORT:-8080}/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dokuru-lab

  checkout-api:
    image: node:20-alpine
    container_name: dokuru-lab-checkout-api
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        cat > /tmp/checkout-api.js <<'EOF'
        const http = require('node:http');

        function checkoutWork() {
          let checksum = 0;
          for (let i = 0; i < 1800000; i += 1) checksum = (checksum + i) % 9973;
          return checksum;
        }

        const server = http.createServer((request, response) => {
          const started = Date.now();
          if (request.url === '/health') {
            response.writeHead(200, { 'content-type': 'application/json' });
            response.end(JSON.stringify({ ok: true, service: 'checkout-api' }));
            return;
          }

          const checksum = checkoutWork();
          response.writeHead(200, { 'content-type': 'application/json' });
          response.end(JSON.stringify({ ok: true, service: 'checkout-api', checksum, latency_ms: Date.now() - started }));
        });

        server.listen(3000, '0.0.0.0', () => console.log('checkout-api listening on :3000'));
        EOF
        node /tmp/checkout-api.js
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - dokuru-lab

  customer-db:
    image: postgres:16-alpine
    container_name: dokuru-lab-customer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: prod_user
      POSTGRES_PASSWORD: SuperSecretP@ssw0rd123
      POSTGRES_DB: customer_data
    networks:
      - dokuru-lab

  latency-probe:
    image: alpine/curl:latest
    container_name: dokuru-lab-latency-probe
    restart: unless-stopped
    entrypoint: ["sh", "-c"]
    command:
      - |
        while true; do
          { date -u +%Y-%m-%dT%H:%M:%SZ | tr '\n' ' '; curl -sS -m 2 -o /dev/null -w 'status=%{http_code} latency_s=%{time_total}\n' http://checkout-api:3000/checkout 2>/dev/null || true; } | tee -a /data/latency-probe.log
          sleep 0.5
        done
    depends_on:
      checkout-api:
        condition: service_healthy
    volumes:
      - ./data:/data
    networks:
      - dokuru-lab

volumes:
  caddy-data:
  caddy-config:

networks:
  dokuru-lab:
    name: dokuru-lab
    driver: bridge
